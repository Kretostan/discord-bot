name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with: 
          node-version: 25

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check (lint + format)
        run: npx biome check .

      - name: Build
        run: pnpm build

      - name: Generate poToken
        id: generate
        run: |
          RESULT=$(node dist/scripts/generate-po-token.js)
          PO_TOKEN=$(echo "$RESULT" | jq -r '.poToken')
          VISITOR_DATA=$(echo "$RESULT" | jq -r '.visitorData')
          echo "::add-mask::$PO_TOKEN"
          echo "::add-mask::$VISITOR_DATA"
          echo "po_token=$PO_TOKEN" >> "$GITHUB_OUTPUT"
          echo "visitor_data=$VISITOR_DATA" >> "$GITHUB_OUTPUT"

      - name: Create env file
        run: |
          echo "CLIENT_ID=${{ secrets.CLIENT_ID }}" >> .env
          echo "DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}" >> .env
          echo "GUILD_TOKEN=${{ secrets.GUILD_ID }}" >> .env
          echo "YT_PO_TOKEN=${{ steps.generate.outputs.po_token }}" >> .env
          echo "YT_VISITOR_DATA=${{ steps.generate.outputs.visitor_data }}" >> .env

      - name: Remove old files
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            rm -rf /home/ubuntu/discord-bot/*

      - name: Copy files to VPS
        uses: appleboy/scp-action@v1
        with: 
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          source: "."
          target: '/home/ubuntu/discord-bot'

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            echo "Deploying Kretobot..."
            export PATH=$PATH:/home/ubuntu/.nvm/versions/node/v25.7.0/bin
            NODE_ENV=production pm2 reload discord-bot --update-env
